<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AirSentinel Mobile</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=DM+Mono:ital@0;1&display=swap" rel="stylesheet">
    
    <!-- Plotly.js pour correspondre au Dashboard Python -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

    <style>
        :root {
            --bg-dark: #020617;
            --bg-panel: #0f172a;
            --bg-elevated: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-blue: #0ea5e9;
            --nav-bg: rgba(15, 23, 42, 0.85);

            --status-0: #10b981;
            --status-1: #f59e0b;
            --status-2: #f97316;
            --status-3: #ef4444;
            --status-4: #991b1b;
            --status-5: #4c0519;

            --current-status: var(--status-0);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }

        /* --- HEADER --- */
        header {
            padding: calc(env(safe-area-inset-top) + 12px) 16px 12px;
            background: var(--bg-dark);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            z-index: 10;
        }

        .header-title {
            font-weight: 900; font-size: 18px;
            display: flex; align-items: center; gap: 6px;
            white-space: nowrap; flex: 1;
        }
        .header-title span { color: var(--accent-blue); }

        .city-selector { flex: 0 0 auto; margin-left: 10px; position: relative; }
        .city-selector select {
            background: var(--bg-elevated);
            color: white; border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 26px 6px 12px; border-radius: 8px;
            font-size: 13px; font-weight: 600; outline: none;
            appearance: none; max-width: 140px; text-overflow: ellipsis;
        }
        .city-selector::after {
            content: "▼"; position: absolute; right: 10px; top: 50%;
            transform: translateY(-50%); font-size: 9px; color: var(--text-muted); pointer-events: none;
        }

        /* --- MAIN VIEWS --- */
        main {
            flex: 1;
            position: relative;
            overflow: hidden;
            background-color: var(--bg-dark);
        }

        .view {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }

        .view.active {
            opacity: 1;
            pointer-events: auto;
            z-index: 5;
        }

        /* View: Carte Plotly */
        #map { width: 100%; height: 100%; z-index: 1; background: #000; }

        /* General view padding */
        .content-pad { padding: 16px; }

        /* Card styles */
        .card {
            background: linear-gradient(145deg, var(--bg-panel), var(--bg-elevated));
            border-radius: 16px; padding: 20px; margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* --- KPI View --- */
        .big-number { font-size: 48px; font-weight: 900; font-family: 'DM Mono', monospace; line-height: 1; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .badge {
            display: inline-block; padding: 4px 12px; border-radius: 12px;
            font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .ratios { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
        .ratio-badge {
            background: rgba(0,0,0,0.2); padding: 4px 8px; border-radius: 8px;
            font-size: 10px; font-weight: 700; border: 1px solid rgba(255,255,255,0.1);
        }

        /* --- PREDICTIONS View --- */
        .chart-container { position: relative; height: 350px; width: 100%; margin-top: 5px; margin-bottom: 20px; }
        
        /* Animation ciblée sur les lignes (scatterlayer) Plotly, au lieu de la boite entière */
        .chart-animated .scatterlayer { animation: revealGraph 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        @keyframes revealGraph {
            0% { clip-path: polygon(0 0, 0 0, 0 100%, 0 100%); opacity: 0; }
            10% { opacity: 1; }
            100% { clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%); opacity: 1; }
        }

        .pred-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .pred-box { background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px 4px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        .pred-box .day { font-size: 9px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; font-weight:bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pred-box .val { font-size: 16px; font-weight: 900; font-family: 'DM Mono'; }

        /* --- ALERTES View --- */
        .reco-tabs { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
        .reco-tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); flex-shrink: 0;
            color: var(--text-muted); padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap;
        }
        .tab-btn.active { background: rgba(255,255,255,0.15); color: white; border-color: rgba(255,255,255,0.3); }
        .reco-content { background: rgba(0,0,0,0.3); border-radius: 12px; padding: 16px; font-size: 14px; line-height: 1.5; border-left: 4px solid var(--current-status); }

        .toggle-container {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(14, 165, 233, 0.1); border: 1px solid var(--accent-blue);
            padding: 16px; border-radius: 12px; margin-bottom: 20px;
        }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: rgba(255,255,255,0.2); transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--status-0); }
        input:checked + .slider:before { transform: translateX(20px); }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: calc(65px + env(safe-area-inset-bottom));
            background: var(--nav-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom); z-index: 100;
        }

        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 10px; font-weight: 600;
            width: 25%; height: 100%; border: none; background: none; transition: 0.2s;
        }
        .nav-item.active { color: var(--accent-blue); }
        .nav-item .icon { font-size: 20px; margin-bottom: 4px; filter: grayscale(1); transition: 0.2s; }
        .nav-item.active .icon { filter: grayscale(0); transform: translateY(-2px); }

        /* Splash */
        #loading {
            position: fixed; inset: 0; background: var(--bg-dark); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s;
        }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-left-color: var(--accent-blue); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <h2 style="font-weight:300;">Air<span style="color:#0ea5e9; font-weight:800;">Sentinel</span></h2>
    </div>

    <!-- HEADER -->
    <header>
        <div class="header-title">🌍 Air<span>Sentinel</span></div>
        <div class="city-selector">
            <select id="citySelect">
                <option value="" disabled selected>Ville...</option>
            </select>
        </div>
    </header>

    <!-- CONTENT VIEWS -->
    <main>
        <!-- VUE 1: CARTE -->
        <div id="view-carte" class="view active">
            <div id="map"></div>
        </div>

        <!-- VUE 2: DATA (KPI) -->
        <div id="view-data" class="view">
            <div class="content-pad">
                <h3 style="margin-bottom: 12px; color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Aujourd'hui · <span id="kpi-date" style="color: white;"></span></h3>
                
                <div class="card" id="kpi-card" style="border-top: 4px solid var(--current-status); text-align: center;">
                    <div class="badge" id="kpi-badge" style="background: rgba(255,255,255,0.1); margin-bottom: 15px;">--</div>
                    <div class="big-number" id="kpi-pm" style="color: var(--current-status);">--</div>
                    <div style="font-size: 12px; color: var(--text-muted); margin-top: 8px; font-weight: 600;">µg/m³ (Concentration PM2.5)</div>
                    
                    <!-- Ratios OMS et CMR -->
                    <div class="ratios">
                        <div class="ratio-badge" style="color: var(--status-2); border-color: rgba(249, 115, 22, 0.3);" id="kpi-ratio-oms">-- x OMS</div>
                        <div class="ratio-badge" style="color: var(--status-0); border-color: rgba(16, 185, 129, 0.3);" id="kpi-ratio-cmr">-- x CMR</div>
                    </div>

                    <div style="margin-top: 20px; display: flex; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 20px;">
                        <div>
                            <div style="font-size: 20px; font-weight:900;" id="kpi-temp">--°C</div>
                            <div style="font-size: 10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px;">Temp</div>
                        </div>
                        <div style="width: 1px; background: rgba(255,255,255,0.05);"></div>
                        <div>
                            <div style="font-size: 20px; font-weight:900;" id="kpi-vent">--</div>
                            <div style="font-size: 10px; color:var(--text-muted); text-transform:uppercase; margin-top:4px;">Vent</div>
                        </div>
                        <div style="width: 1px; background: rgba(255,255,255,0.05);"></div>
                        <div>
                            <div style="font-size: 20px; font-weight:900; color:var(--accent-blue);" id="kpi-irs">--</div>
                            <div style="font-size: 10px; color:var(--accent-blue); text-transform:uppercase; margin-top:4px;">IRS</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- VUE 3: PREDICTIONS -->
        <div id="view-pred" class="view">
            <div class="content-pad">
                <h3 style="margin-bottom: 16px; color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Évolution sur 72h</h3>
                <div class="card">
                    <!-- Graphique Plotly -->
                    <div class="chart-container" id="predChart"></div>

                    <!-- Boites de valeurs -->
                    <div class="pred-grid" id="pred-grid-container">
                        <!-- Rempli par JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- VUE 4: ALERTES -->
        <div id="view-alertes" class="view">
            <div class="content-pad">
                <div class="toggle-container">
                    <div>
                        <div style="font-weight: 800; font-size: 15px;">Notifications SMS/Push</div>
                        <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">Recevoir une alerte si la zone ciblée se dégrade.</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="notifSwitch">
                        <span class="slider"></span>
                    </label>
                </div>

                <h3 style="margin-bottom: 16px; color: var(--text-muted); font-size: 14px; text-transform: uppercase;">Décision Santé</h3>
                <div class="card" id="reco-card" style="border-left: 4px solid var(--current-status); padding: 15px;">
                    <div class="reco-tabs">
                        <button class="tab-btn active" data-target="citoyen">👤 Citoyen</button>
                        <button class="tab-btn" data-target="medecin">⚕️ Médecin</button>
                        <button class="tab-btn" data-target="maire">🏛️ Maire</button>
                        <button class="tab-btn" data-target="chercheur">🔬 Expert</button>
                    </div>
                    <div class="reco-content" id="recoText" style="min-height: 80px;">
                        Sélectionnez une ville.
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <button class="nav-item active" data-target="view-carte">
            <div class="icon">🌍</div><span>Carte</span>
        </button>
        <button class="nav-item" data-target="view-data">
            <div class="icon">📊</div><span>Data</span>
        </button>
        <button class="nav-item" data-target="view-pred">
            <div class="icon">📈</div><span>Prédire</span>
        </button>
        <button class="nav-item" data-target="view-alertes">
            <div class="icon">⚠️</div><span>Alertes</span>
        </button>
    </nav>

    <!-- Scripts -->
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <script>
        const API_BASE = "http://localhost:8000";
        const SEUIL_OMS = 15.0;

        // Global State
        let map;
        let markers = {};
        let activeCity = null;
        let pwaData = { villes: [], alerteCache: {}, predCache: {}, dataCache: {} };
        let pollingInterval = null;

        const CSS_COLORS = ['#10b981', '#f59e0b', '#f97316', '#ef4444', '#991b1b', '#4c0519'];

        // Initialisation de la VRAIE date d'aujourd'hui
        function setTodayDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('kpi-date').textContent = new Date().toLocaleDateString('fr-FR', options);
        }

        async function boot() {
            try {
                setTodayDate();
                registerServiceWorker();
                await loadCities();
                setupNav();
                setupInteractions();
            } catch (e) {
                console.error("Erreur critique au démarrage :", e);
                alert("Erreur technique JavaScript : " + e.message + "\n\n" + e.stack);
            } finally {
                document.getElementById('loading').style.opacity = 0;
                setTimeout(() => document.getElementById('loading').style.display = 'none', 400);
            }
            
            if ("Notification" in window && Notification.permission === "granted") {
                document.getElementById('notifSwitch').checked = true;
            }
        }

        function registerServiceWorker() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW Error:', err));
            }
        }

        function setupNav() {
            const navItems = document.querySelectorAll('.nav-item');
            const views = document.querySelectorAll('.view');

            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    navItems.forEach(n => n.classList.remove('active'));
                    item.classList.add('active');
                    views.forEach(v => v.classList.remove('active'));
                    const targetView = document.getElementById(item.dataset.target);
                    targetView.classList.add('active');
                    
                    if (item.dataset.target === 'view-carte' && map) {
                        setTimeout(() => Plotly.Plots.resize('map'), 50);
                    }
                    
                    // Relance l'animation de dessin lors du clic sur l'onglet Prédire
                    if (item.dataset.target === 'view-pred') {
                        const chartEl = document.getElementById('predChart');
                        if(chartEl) {
                            chartEl.classList.remove('chart-animated');
                            void chartEl.offsetWidth; // trigger reflow
                            chartEl.classList.add('chart-animated');
                        }
                    }
                });
            });

            window.addEventListener('resize', () => {
                if (document.getElementById('map') && document.getElementById('map').data) {
                    Plotly.Plots.resize('map');
                }
                if (document.getElementById('predChart') && document.getElementById('predChart').data) {
                    Plotly.Plots.resize('predChart');
                }
            });
        }

        function drawMap(dataVilles, highlightedCity = null) {
            let filterData = highlightedCity && highlightedCity !== "Toutes les villes" 
                ? dataVilles.filter(v => v.ville === highlightedCity && v.latitude && v.longitude)
                : dataVilles.filter(v => v.latitude && v.longitude);

            const displayData = filterData.length > 0 ? filterData : dataVilles.filter(v => v.latitude && v.longitude);

            const lats = displayData.map(v => v.latitude);
            const lons = displayData.map(v => v.longitude);
            const texts = displayData.map(v => v.ville);
            const sizes = displayData.map(v => Math.max(10, Math.min(25, v.pm25_actuel)));
            const colors = displayData.map(v => v.pm25_actuel);

            // Same colorscale as dashboard
            const cscale = [[0,'#10b981'],[0.4,'#f59e0b'],[0.7,'#f97316'],[1,'#ef4444']];

            const trace = {
                type: 'scattermapbox',
                lat: lats, lon: lons,
                mode: highlightedCity && highlightedCity !== "Toutes les villes" ? 'markers+text' : 'markers',
                marker: { 
                    size: highlightedCity && highlightedCity !== "Toutes les villes" ? 24 : sizes,
                    color: colors,
                    colorscale: cscale,
                    cmin: 5, cmax: 80
                },
                text: texts,
                textposition: "top center",
                textfont: { size: 14, color: '#00d4b1' },
                hovertemplate: "<b>%{text}</b><br>PM2.5 : %{marker.color:.1f} µg/m³<extra></extra>"
            };

            let centerVar = {lat: 7.35, lon: 12.35};
            let zoomVar = 4.8;
            if (highlightedCity && highlightedCity !== "Toutes les villes" && displayData.length > 0) {
                centerVar = {lat: displayData[0].latitude, lon: displayData[0].longitude};
                zoomVar = 8.5;
            }

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
                margin: { l: 0, r: 0, t: 0, b: 0 },
                mapbox: { style: "carto-darkmatter", center: centerVar, zoom: zoomVar },
                showlegend: false
            };

            Plotly.newPlot('map', [trace], layout, { displayModeBar: false, responsive: true });

            document.getElementById('map').on('plotly_click', function(data){
                if(data.points.length > 0) {
                    const selectedCity = data.points[0].text;
                    const select = document.getElementById('citySelect');
                    if (Array.from(select.options).some(o => o.value === selectedCity)) {
                        select.value = selectedCity;
                        triggerCityChange(selectedCity);
                    }
                }
            });
        }

        async function loadCities() {
            try {
                const res = await fetch(`${API_BASE}/villes`);
                if (!res.ok) return;
                const data = await res.json();
                pwaData.villes = data.villes;
                const select = document.getElementById('citySelect');

                // Option Toutes les Villes
                const optA = document.createElement('option');
                optA.value = "Toutes les villes"; optA.textContent = "Toutes les villes";
                select.appendChild(optA);

                // Trier par ordre alphabétique
                data.villes.sort((a,b) => a.ville.localeCompare(b.ville)).forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.ville; opt.textContent = v.ville;
                    select.appendChild(opt);
                });

                select.value = "Toutes les villes";
                
                // Dessiner Map Initiale
                drawMap(pwaData.villes, "Toutes les villes");
                triggerCityChange("Toutes les villes");
            } catch (err) { console.error(err); }
        }

        function setupInteractions() {
            document.getElementById('citySelect').addEventListener('change', (e) => triggerCityChange(e.target.value));

            const tabs = document.querySelectorAll('.reco-tabs .tab-btn');
            tabs.forEach(t => {
                t.addEventListener('click', (e) => {
                    tabs.forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    if (activeCity && pwaData.alerteCache[activeCity]) {
                        document.getElementById('recoText').textContent = pwaData.alerteCache[activeCity].recommandations[e.target.dataset.target];
                    }
                });
            });

            document.getElementById('notifSwitch').addEventListener('change', async (e) => {
                if (e.target.checked) {
                    if (!("Notification" in window)) { alert("Non supporté."); e.target.checked=false; return; }
                    const perm = await Notification.requestPermission();
                    if (perm !== 'granted') { e.target.checked = false; } else { startPolling(); }
                } else { stopPolling(); }
            });
        }

        async function triggerCityChange(ville) {
            activeCity = ville;
            
            // Mise à jour de la carte Plotly
            if (pwaData.villes.length > 0) {
                drawMap(pwaData.villes, ville);
            }

            const [dataRes, predRes, alerteRes] = await Promise.all([
                fetch(`${API_BASE}/data/${ville}?jours=1`).then(r => r.ok ? r.json() : null).catch(()=>null),
                fetch(`${API_BASE}/predict/${ville}`).then(r => r.ok ? r.json() : null).catch(()=>null),
                fetch(`${API_BASE}/alerte/${ville}`).then(r => r.ok ? r.json() : null).catch(()=>null)
            ]);

            if (dataRes) pwaData.dataCache[ville] = dataRes;
            if (predRes) pwaData.predCache[ville] = predRes;
            if (alerteRes) pwaData.alerteCache[ville] = alerteRes;

            updateAllViews(ville);
        }

        function updateAllViews(ville) {
            const data = pwaData.dataCache[ville];
            const pred = pwaData.predCache[ville];
            const alerte = pwaData.alerteCache[ville];
            if (!data || !pred || !alerte) return;

            const code = alerte.niveau.code;
            const color = CSS_COLORS[code] || CSS_COLORS[0];
            document.documentElement.style.setProperty('--current-status', color);

            // 1. Data View (KPIs & Contexte dynamique CMR par ville)
            const pm25_actuel = data.pm25_actuel;
            const seuil_cmr_local = pred.seuil_cmr || 40.5;

            document.getElementById('kpi-pm').textContent = pm25_actuel;
            document.getElementById('kpi-badge').textContent = data.niveau.niveau;
            document.getElementById('kpi-badge').style.color = color;
            document.getElementById('kpi-card').style.borderColor = color;
            
            // Calculs OMS et CMR pour le PWA dynamiques
            const ratio_oms = (pm25_actuel / SEUIL_OMS).toFixed(1);
            const ratio_cmr = (pm25_actuel / seuil_cmr_local).toFixed(1);
            
            const badgeOms = document.getElementById('kpi-ratio-oms');
            badgeOms.textContent = `${ratio_oms} x OMS`;
            badgeOms.style.color = ratio_oms <= 1 ? CSS_COLORS[0] : CSS_COLORS[3];
            badgeOms.style.borderColor = ratio_oms <= 1 ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)';

            const badgeCmr = document.getElementById('kpi-ratio-cmr');
            badgeCmr.textContent = `${ratio_cmr} x CMR`;
            badgeCmr.style.color = ratio_cmr <= 1 ? CSS_COLORS[0] : CSS_COLORS[2]; 
            badgeCmr.style.borderColor = ratio_cmr <= 1 ? 'rgba(16,185,129,0.3)' : 'rgba(249,115,22,0.3)';

            const lastRow = data.historique && data.historique.length > 0 ? data.historique[data.historique.length - 1] : null;
            document.getElementById('kpi-temp').textContent = lastRow && lastRow.temperature_2m_max ? lastRow.temperature_2m_max.toFixed(1) + "°C" : "N/A";
            document.getElementById('kpi-vent').textContent = lastRow && lastRow.wind_speed_10m_max ? lastRow.wind_speed_10m_max.toFixed(1) : "N/A";
            document.getElementById('kpi-irs').textContent = lastRow && lastRow.IRS ? lastRow.IRS.toFixed(3) : "N/A";

            // 2. Predictions View (Boxes + Graphique Plotly Exact)
            const grid = document.getElementById('pred-grid-container');
            grid.innerHTML = '';
            
            const predDates = [];
            const predVals = [];
            const predHigh = [];
            const predLow = [];

            pred.predictions.forEach(p => {
                const pcol = CSS_COLORS[p.niveau.code] || CSS_COLORS[0];
                
                let jourCourt = p.label;
                if(jourCourt === "Aujourd'hui") jourCourt = "AUJ.";
                else if(jourCourt === "Après-demain") jourCourt = "+2J";
                
                const valArrondie = Number(p.pm25_predit).toFixed(1);

                grid.innerHTML += `
                    <div class="pred-box" style="border-bottom: 3px solid ${pcol}">
                        <div class="day">${jourCourt}</div>
                        <div class="val" style="color:${pcol}">${valArrondie}</div>
                    </div>
                `;

                predDates.push(p.date);
                predVals.push(Number(p.pm25_predit));
                predHigh.push(p.pm25_max);
                predLow.push(p.pm25_min);
            });

            // --- Construction Plotly Mobile ---
            const traces = [];
            const shapes = [];
            const annotations = [];

            // Historique 60j
            if (pred.historique && pred.historique.dates && pred.historique.dates.length > 0) {
                traces.push({
                    x: pred.historique.dates,
                    y: pred.historique.pm25,
                    type: 'scatter', mode: 'lines',
                    fill: 'tozeroy', fillcolor: 'rgba(14,165,233,0.08)',
                    line: { color: '#0ea5e9', width: 2.5 },
                    name: 'Historique'
                });

                // Ligne de connexion pointillée
                traces.push({
                    x: [pred.historique.dates[pred.historique.dates.length-1], predDates[0]],
                    y: [pred.historique.pm25[pred.historique.pm25.length-1], predVals[0]],
                    type: 'scatter', mode: 'lines',
                    line: { color: '#f59e0b', width: 1.5, dash: 'dot' },
                    showlegend: false, hoverinfo: 'skip'
                });
            }

            // Intervalle de confiance
            traces.push({
                x: predDates.concat(predDates.slice().reverse()),
                y: predHigh.concat(predLow.slice().reverse()),
                fill: "toself", fillcolor: "rgba(245,158,11,0.18)",
                line: { color: "rgba(0,0,0,0)" },
                type: 'scatter', hoverinfo: 'skip',
                name: 'IC'
            });

            // Predictions
            traces.push({
                x: predDates, y: predVals,
                type: 'scatter', mode: 'lines+markers+text',
                line: { color: '#f59e0b', width: 3, dash: 'dash' },
                marker: { size: 10, color: '#f59e0b', symbol: 'diamond', line: { color: '#1e293b', width: 2 } },
                text: predVals.map(v => v.toFixed(1)),
                textposition: 'top center',
                textfont: { color: '#f59e0b', size: 12, family: 'DM Mono', weight: 'bold' },
                name: 'Prédiction'
            });

            // Seuil OMS
            shapes.push({
                type: 'line', x0: 0, x1: 1, xref: 'paper', y0: 15, y1: 15, yref: 'y',
                line: { color: '#ef4444', width: 1.5, dash: 'dash' }
            });
            annotations.push({
                x: 0, y: 15, xref: 'paper', yref: 'y', text: 'OMS 15', showarrow: false,
                font: { color: '#ef4444', size: 9 }, xanchor: 'left', yanchor: 'bottom'
            });

            // Seuil CMR
            shapes.push({
                type: 'line', x0: 0, x1: 1, xref: 'paper', y0: seuil_cmr_local, y1: seuil_cmr_local, yref: 'y',
                line: { color: '#14b8a6', width: 1.5, dash: 'dot' }
            });
            annotations.push({
                x: 1, y: seuil_cmr_local, xref: 'paper', yref: 'y', text: `CMR ${seuil_cmr_local}`, showarrow: false,
                font: { color: '#14b8a6', size: 9 }, xanchor: 'right', yanchor: 'bottom'
            });

            // Zone prédite ombre jaune
            shapes.push({
                type: 'rect', x0: predDates[0], x1: predDates[predDates.length-1], xref: 'x', y0: 0, y1: 1, yref: 'paper',
                fillcolor: 'rgba(245,158,11,0.05)', line: { width: 0 }
            });

            const layout = {
                paper_bgcolor: 'rgba(0,0,0,0)',
                plot_bgcolor: 'rgba(0,0,0,0)',
                margin: { l: 12, r: 12, t: 25, b: 35 },
                xaxis: { 
                    gridcolor: 'rgba(255,255,255,0.05)', 
                    tickfont: { color: '#94a3b8', size: 10 }, 
                    automargin: true,
                    tickformat: '%d %b',
                    nticks: 6
                },
                yaxis: { 
                    gridcolor: 'rgba(255,255,255,0.05)', 
                    tickfont: { color: '#94a3b8', size: 10 }, 
                    zeroline: false, 
                    automargin: true 
                },
                showlegend: false,
                shapes: shapes,
                annotations: annotations
            };

            Plotly.newPlot('predChart', traces, layout, {displayModeBar: false, responsive: true}).then(() => {
                // S'assurer que l'animation est prête si la vue est active
                const chartEl = document.getElementById('predChart');
                chartEl.classList.add('chart-animated');
            });


            // 3. Alertes View
            document.getElementById('reco-card').style.borderColor = color;
            const activeTab = document.querySelector('.reco-tabs .active').dataset.target;
            
            if (alerte.recommandations) {
                document.getElementById('recoText').textContent = alerte.recommandations[activeTab] || "Données indisponibles";
            }
        }

        // --- Polling (Demo) ---
        function startPolling() {
            if (pollingInterval) clearInterval(pollingInterval);
            pollingInterval = setInterval(async () => {
                if (!activeCity) return;
                try {
                    const res = await fetch(`${API_BASE}/alerte/${activeCity}`);
                    if (!res.ok) return;
                    const data = await res.json();
                    if (data.niveau.code >= 2) {
                        new Notification(`AirSentinel : Alerte pollution à ${activeCity}`, {
                            body: `Niveau Actuel: ${data.niveau.niveau} (${data.pm25} µg/m³).`,
                            icon: './manifest.json'
                        });
                    }
                } catch (e) {}
            }, 60000); 
            new Notification('AirSentinel Activé', {body: 'Alertes locales actives.'});
        }
        function stopPolling() { if (pollingInterval) clearInterval(pollingInterval); pollingInterval = null; }

        window.addEventListener('DOMContentLoaded', boot);
    </script>
</body>
</html>
