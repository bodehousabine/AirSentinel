name: 📅 AirSentinel — Mise à jour quotidienne

on:
  schedule:
    # Tous les jours à 00h00 UTC (08h00 heure Cameroun)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Permet aussi de lancer manuellement depuis GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout du code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Installation des dépendances
        run: |
          pip install openmeteo-requests requests-cache retry-requests \
                      pandas numpy openpyxl joblib scikit-learn

      - name: 🌍 Mise à jour des données
        run: python update_daily.py

      - name: 💾 Commit et push des nouvelles données
        run: |
          git config --local user.email "airsentinel@dpa-greentech.cm"
          git config --local user.name "AirSentinel Bot"
          git add data/processed/dataset_final.xlsx
          git diff --staged --quiet || git commit -m "📅 Mise à jour quotidienne $(date +'%Y-%m-%d')"
          git push
